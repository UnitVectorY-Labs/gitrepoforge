$schema: http://json-schema.org/draft-07/schema#
additionalProperties: false
properties:
    config:
        additionalProperties: false
        properties:
            docs:
                additionalProperties: false
                description: Documentation settings.
                properties:
                    domain:
                        type: string
                    enabled:
                        default: true
                        type: boolean
                required:
                    - domain
                type: object
        required:
            - docs
        type: object
    default_branch:
        description: The default branch of the repository.
        type: string
    name:
        description: Must match the repository folder name.
        type: string
required:
    - config
    - default_branch
    - name
type: object
