$schema: http://json-schema.org/draft-07/schema#
additionalProperties: false
properties:
    config:
        additionalProperties: false
        properties:
            enable_license:
                default: true
                type: boolean
            license:
                default: mit
                enum:
                    - mit
                    - apache-2.0
                type: string
        required:
            - license
        type: object
    default_branch:
        description: The default branch of the repository.
        type: string
    name:
        description: Must match the repository folder name.
        type: string
required:
    - config
    - default_branch
    - name
type: object
