$schema: http://json-schema.org/draft-07/schema#
additionalProperties: false
properties:
    config:
        additionalProperties: false
        properties:
            versions:
                additionalProperties: false
                properties:
                    go:
                        pattern: ^(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)$
                        type: string
                type: object
        type: object
    default_branch:
        description: The default branch of the repository.
        type: string
    name:
        description: Must match the repository folder name.
        type: string
required:
    - default_branch
    - name
type: object
